[build-system]
requires = ["pdm-backend", "setuptools>=61.0", "setuptools-scm"]
build-backend = "pdm.backend"

[project]
name = "kuhl-haus-mdp-servers"
dynamic = ["version"]
description = "Container image build repository for market data processing servers"
authors = [
    { name = "Tom Pounders", email = "git@oldschool.engineer" },
]
readme = "README.rst"
requires-python = ">=3.12"
license-files = ["LICENSE.txt"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python"
]
dependencies = [
    "kuhl-haus-mdp==0.4.17",
    "websockets",
    "aio-pika",
    "redis",
    "tenacity",
    "fastapi",
    "uvicorn[standard]",
    "pydantic-settings",
    "python-dotenv",
    "massive",
    "importlib_metadata",
]

[project.urls]
Homepage = "https://github.com/kuhl-haus/kuhl-haus-mdp-servers"
Documentation = "https://github.com/kuhl-haus/kuhl-haus-mdp-servers/wiki"
Source = "https://github.com/kuhl-haus/kuhl-haus-mdp-servers.git"
Changelog = "https://github.com/kuhl-haus/kuhl-haus-mdp-servers/commits"
Tracker = "https://github.com/kuhl-haus/kuhl-haus-mdp-servers/issues"

[project.optional-dependencies]
testing = [
    "setuptools",
    "setuptools-scm",
    "pdm",
    "pdm-backend",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "httpx",
    "asgi-lifespan",
]

[project.scripts]
fdl_server = "kuhl_haus.servers.fdl_server:app"
fdp_server = "kuhl_haus.servers.fdp_server:app"
lba_server = "kuhl_haus.servers.lba_server:app"
mdl_server = "kuhl_haus.servers.mdl_server:app"
mdp_server = "kuhl_haus.servers.mdp_server:app"
mds_server = "kuhl_haus.servers.mds_server:app"
wds_server = "kuhl_haus.servers.wds_server:app"


[tool.setuptools]
zip-safe = true
include-package-data = true
package-dir = {"" = "src"}
packages = {find = {where = ["src"], exclude = ["tests"]}}

[tool.setuptools_scm]
version_scheme = "guess-next-dev"
local_scheme = "no-local-version"

[tool.pdm]
distribution = true
version = { source = "scm" }

[tool.pdm.build]
package-dir = "src"
includes = ["src/kuhl_haus"]

[tool.pytest.ini_options]
addopts = ["--verbose"]
asyncio_mode = "auto"
norecursedirs = ["dist", "build", ".tox"]
testpaths = ["tests"]

[tool.devpi.upload]
no_vcs = 1
formats = ["bdist_wheel"]

[tool.flake8]
max_line_length = 88
extend_ignore = ["E203", "W503"]
exclude = [".tox", "build", "dist", ".eggs", "docs/conf.py"]

[tool.pyscaffold]
version = "4.6"
package = "servers"
extensions = ["namespace"]
namespace = "kuhl_haus"
