            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mds-otel-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # WDS images
      - name: Build and push WDS Docker image
        uses: docker/build-push-action@v6
        with:
