          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp-otel-server:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp-otel-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # LBA images
      - name: Build and push LBA Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./lba.Dockerfile
          platforms: linux/amd64
