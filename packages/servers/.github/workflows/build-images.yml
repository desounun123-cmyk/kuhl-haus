            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push MDP (OTel auto-instrumented) Docker image
        uses: docker/build-push-action@v6
        with:
