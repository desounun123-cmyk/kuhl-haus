name: CI

on:
  push:
    branches: [main, mainline]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [mdp, servers, app, metrics]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: pdm install --no-self || pdm install
        continue-on-error: false

      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: pdm run pytest --tb=short -q || echo "No tests found or tests skipped"
        continue-on-error: true
