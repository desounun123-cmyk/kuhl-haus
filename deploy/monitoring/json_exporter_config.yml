modules:
  mdl_health:
    metrics:
      # Service status
      - name: kuhl_haus_service_up
        help: Service status (1=OK, 0=not OK)
        path: '{.status_code}'
        labels:
          service: '{.service}'
          container_image: '{.container_image}'
          image_version: '{.image_version}'

      - name: kuhl_haus_mdl_auto_start_enabled
        help: Auto-start enabled status
        path: '{.auto-start}'
        labels:
          service: '{.service}'

      # MDL queue connection metrics
      - name: kuhl_haus_mdl_mdq_connected
        help: MDQ connection status
        path: '{.mdq_connection_status.connected}'
        labels:
          service: '{.service}'

      # MDL feed connection
      - name: kuhl_haus_mdl_feed_connected
        help: MDL feed connection status
        path: '{.mdl_connection_status.connected}'
        labels:
          service: '{.service}'
          feed: '{.mdl_connection_status.feed}'
          market: '{.mdl_connection_status.market}'

      - name: kuhl_haus_mdl_reconnect_attempts_total
        help: Total reconnection attempts
        path: '{.mdq_connection_status.reconnect_attempts}'
        labels:
          service: '{.service}'
          feed: '{.mdl_connection_status.feed}'
          market: '{.mdl_connection_status.market}'

      # MDL feed message metrics
      - name: kuhl_haus_mdl_messages_received_total
        help: Total messages received from Massive.com WebSocket
        path: '{.mdq_connection_status.messages_received}'
        labels:
          service: '{.service}'

      # Message counts by queue type
      - name: kuhl_haus_mdl_message_total
        help: Total messages by queue
        path: '{.mdq_connection_status.trades}'
        labels:
          service: '{.service}'
          queue: 'trades'

      - name: kuhl_haus_mdl_message_total
        help: Total messages by queue
        path: '{.mdq_connection_status.aggregate}'
        labels:
          service: '{.service}'
          queue: 'aggregate'

      - name: kuhl_haus_mdl_message_total
        help: Total messages by queue
        path: '{.mdq_connection_status.quotes}'
        labels:
          service: '{.service}'
          queue: 'quotes'

      - name: kuhl_haus_mdl_message_total
        help: Total messages by queue
        path: '{.mdq_connection_status.halts}'
        labels:
          service: '{.service}'
          queue: 'halts'

      - name: kuhl_haus_mdl_message_total
        help: Total messages by queue
        path: '{.mdq_connection_status.news}'
        labels:
          service: '{.service}'
          queue: 'news'

      - name: kuhl_haus_mdl_message_total
        help: Total messages by queue
        path: '{.mdq_connection_status.unknown}'
        labels:
          service: '{.service}'
          queue: 'unknown'

      # Error metrics
      - name: kuhl_haus_mdl_errors_total
        help: Error counts by type
        path: '{.mdq_connection_status.unsupported_messages}'
        labels:
          service: '{.service}'
          error_type: 'unsupported'

