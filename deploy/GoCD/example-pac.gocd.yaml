format_version: 10
common:
  pipeline-group: &pipeline_group "Kuhl-Haus-MDP"
  pipeline-label: &pipeline_label ${COUNT}
  pipeline-lock-behavior: &pipeline_lock_behavior unlockWhenFinished

  # Materials
  mdp-app-repo: &mdp_app_repo
    git: https://github.com/kuhl-haus/kuhl-haus-mdp-app
    username: YOUR-USER-NAME
    shallow_clone: false
    auto_update: true
    branch: mainline
    encrypted_password: YOUR-GOCD-ENCRYPTED-PERSONAL-ACCESS-TOKEN
    destination: kuhl-haus-mdp-app
  mdp-servers-repo: &mdp_servers_repo
    git: https://github.com/kuhl-haus/kuhl-haus-mdp-servers
    username: YOUR-USER-NAME
    shallow_clone: false
    auto_update: true
    branch: mainline
    encrypted_password: YOUR-GOCD-ENCRYPTED-PERSONAL-ACCESS-TOKEN
    destination: kuhl-haus-mdp-servers
  mdp-deploy-repo: &mdp_deploy_repo
    git: https://github.com/YOUR-USER-NAME/kuhl-haus-mdp-deployment
    username: YOUR-USER-NAME
    shallow_clone: true
    auto_update: true
    branch: mainline
    encrypted_password: YOUR-GOCD-ENCRYPTED-PERSONAL-ACCESS-TOKEN
    destination: deploy


  ## Build and Push Docker Images
  pre-reqs-and-k8s-infra: &pre_reqs_and_k8s_infra
    fetch_materials: true
    keep_artifacts: true
    clean_workspace: true
    approval:
      type: success
      allow_only_on_success: true
    jobs:
      run-scripts:
        timeout: 0
        run_instances: all
        tasks:
        - exec:
            command: sudo
            arguments:
            - ls
            - -hal
        - exec:
            arguments:
            - -c
            - for f in ./deploy/scripts/*; do chmod +x $f; done
            command: /bin/sh
            run_if: passed
        - exec:
            command: sudo
            arguments:
            - -EHn
            - ./deploy/scripts/01-run-prereq-playbook.sh
        - exec:
            command: sudo
            arguments:
            - -EHn
            - ./deploy/scripts/02-run-k8s-infra-playbook.sh
  
  ## Application
  run-deploy-app-playbook: &run_deploy_app_playbook
    fetch_materials: true
    keep_artifacts: true
    clean_workspace: true
    approval:
      type: success
      allow_only_on_success: true
    jobs:
      run-scripts:
        timeout: 0
        run_instances: all
        tasks:
        - exec:
            arguments:
            - -c
            - for f in ./deploy/scripts/*; do chmod +x $f; done
            command: /bin/sh
            run_if: passed
        - exec:
            command: sudo
            arguments:
            - -EHn
            - ./deploy/scripts/03-run-app-playbook.sh
  smoke-test-app: &smoke_test_app
    fetch_materials: false
    keep_artifacts: false
    clean_workspace: false
    approval:
      type: success
      allow_only_on_success: true
    jobs:
      run-scripts:
        timeout: 0
        run_instances: all
        tasks:
        - exec:
            command: sudo
            arguments:
            - -EHn
            - ./deploy/scripts/smoke-test-app.sh  
  
  ## Data Plane
  run-data-plane-certificate-manager-playbook: &run_data_plane_certificate_manager_playbook
    fetch_materials: false
    keep_artifacts: false
    clean_workspace: false
    approval:
      type: success
      allow_only_on_success: true
    jobs:
      run-scripts:
        timeout: 0
        run_instances: all
        tasks:
        - exec:
            command: sudo
            arguments:
            - -EHn
            - ./deploy/scripts/04-run-data-plane-playbook.sh
            - deploy-dp-cm.yml
  run-market-data-cache-playbook: &run_market_data_cache_playbook
    fetch_materials: false
    keep_artifacts: false
    clean_workspace: false
    approval:
      type: success
      allow_only_on_success: true
    jobs:
      run-scripts:
        timeout: 0
        run_instances: all
        tasks:
        - exec:
            command: sudo
            arguments:
            - -EHn
            - ./deploy/scripts/04-run-data-plane-playbook.sh
            - deploy-mdc.yml
  run-market-data-listener-playbook: &run_market_data_listener_playbook
    fetch_materials: false
    keep_artifacts: false
    clean_workspace: false
    approval:
      type: success
      allow_only_on_success: true
    jobs:
      run-scripts:
        timeout: 0
        run_instances: all
        tasks:
        - exec:
            command: sudo
            arguments:
            - -EHn
            - ./deploy/scripts/04-run-data-plane-playbook.sh
            - deploy-mdl.yml
  run-market-data-processor-playbook: &run_market_data_processor_playbook
    fetch_materials: false
