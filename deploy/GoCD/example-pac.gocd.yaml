environments:
  kuhl-haus-mdp-example:
    pipelines:
      - kuhl-haus-mdp-example
    environment_variables:
      BASE_WORKING_DIR: "~/kuhl-haus"
      APP_ENV: example
      APP_DOMAIN: mdp.example.com
      MDC_SERVER_DOMAIN: mdp-cache.example.com
      MDL_SERVER_DOMAIN: mdp-listener.example.com
      MDP_SERVER_DOMAIN: mdp-processor.example.com
      MDQ_SERVER_DOMAIN: mdp-queues.example.com
      WDS_SERVER_DOMAIN: wds.example.com

pipelines:
  kuhl-haus-mdp-example:
    group: *pipeline_group
    label_template: *pipeline_label
    lock_behavior: *pipeline_lock_behavior
    display_order: -1
    materials:
      kuhl-haus-mdp-app: *mdp_app_repo
      kuhl-haus-mdp-servers: *mdp_servers_repo
      kuhl-haus-mdp-deployment: *mdp_deploy_repo
    stages:
      # Idempotent but only needs to be run (successfully) once
      - pre-reqs-and-k8s-infra: *pre_reqs_and_k8s_infra

      # Application
      - deploy-application: *run_deploy_app_playbook
      - smoke-test-app: *smoke_test_app

      # Data Plane: Certificate Manager
      - deploy-data-plane-certificate-manager: *run_data_plane_certificate_manager_playbook
      
      # Data Plane: Cache
      - deploy-market-data-cache: *run_market_data_cache_playbook
      - smoke-test-mdc: *smoke_test_mdc
      
      # Data Plane: Queues
      - deploy-market-data-queue: *run_market_data_queue_playbook
      - smoke-test-mdq: *smoke_test_mdq

      # Data Plane: Widget Data Service
      - deploy-widget-data-service: *run_widget_data_service_playbook
      - smoke-test-wds: *smoke_test_wds

      # Data Plane: Market Data Listener
      - deploy-market-data-listener: *run_market_data_listener_playbook
      - smoke-test-mdl: *smoke_test_mdl

      # Data Plane: Market Data Processor
      - deploy-market-data-processor: *run_market_data_processor_playbook
      - smoke-test-mdp: *smoke_test_mdp

