---
- name: Deploy application
  hosts: all
  gather_facts: true
  become: true
  become_user: stack

  tasks:
    - name: Set runtime facts for Python interpreter
      ansible.builtin.set_fact:
        ansible_python_interpreter: /opt/ansible/venv/bin/python
        ansible_python_venv_dir: /opt/ansible/venv
  
    # Namespace
    - name: Create application namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ app_namespace }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Database Credentials Secret
    - name: Create PostgreSQL credentials secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ database_credentials_secret_name }}"
            namespace: "{{ app_namespace }}"
          stringData:
            POSTGRES_USER: "{{ postgres_user }}"
            POSTGRES_PASSWORD: "{{ postgres_password }}"
            POSTGRES_DB: "{{ postgres_db }}"
            POSTGRES_HOST: "{{ app_name }}-database.{{ app_namespace }}.svc.cluster.local"
            POSTGRES_PORT: "5432"
      environment:
        KUBECONFIG: /home/stack/.kube/config
      no_log: true

    # Database Headless Service
    - name: Create PostgreSQL headless service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ app_name }}-database"
            namespace: "{{ app_namespace }}"
          spec:
            clusterIP: None
            selector:
              app: "{{ app_name }}-database"
            ports:
              - port: 5432
                name: tcp
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Database StatefulSet
    - name: Create PostgreSQL StatefulSet
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: "{{ app_name }}-database"
            namespace: "{{ app_namespace }}"
          spec:
            serviceName: "{{ app_name }}-database"
            replicas: 1
            selector:
              matchLabels:
                app: "{{ app_name }}-database"
            template:
              metadata:
                labels:
                  app: "{{ app_name }}-database"
              spec:
                containers:
                  - name: "{{ app_name }}-database"
                    image: "{{ database_container_image }}"
                    resources:
                      requests:
                        cpu: 1000m
                        memory: 1Gi
                      limits:
                        cpu: 2000m
                        memory: 2Gi
                    ports:
                      - containerPort: 5432
                    env:
                      - name: TZ
                        value: "{{ container_timezone }}"
                      - name: POSTGRES_DB
                        valueFrom:
                          secretKeyRef:
                            name: "{{ database_credentials_secret_name }}"
                            key: POSTGRES_DB
                      - name: POSTGRES_USER
                        valueFrom:
                          secretKeyRef:
                            name: "{{ database_credentials_secret_name }}"
                            key: POSTGRES_USER
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: "{{ database_credentials_secret_name }}"
                            key: POSTGRES_PASSWORD
                      - name: PGDATA
                        value: /var/lib/postgresql/data/pgdata
                    readinessProbe:
                      exec:
                        command:
                          - pg_isready
                          - -U
                          - "{{ postgres_user }}"
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 10
                      successThreshold: 1
                      failureThreshold: 10
                    volumeMounts:
                      - name: database-data
                        mountPath: /var/lib/postgresql/data/
            volumeClaimTemplates:
              - metadata:
                  name: database-data
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: "{{ db_storage_class }}"
                  resources:
                    requests:
                      storage: "{{ db_storage_size }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Wait for database to be ready
    - name: Wait for PostgreSQL to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - "app={{ app_name }}-database"
        wait: yes
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # ACME AWS Credentials Secret
    - name: Create ACME AWS credentials secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ app_namespace }}-route53-credentials"
            namespace: "{{ app_namespace }}"
          stringData:
            access-key-id: "{{ acme_route53_access_key_id }}"
            secret-access-key: "{{ acme_route53_secret_access_key }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config
      no_log: true
      when: acme_route53_access_key_id is defined

    # AWS Route53 Issuer
    - name: Create cert-manager AWS Route53 issuer
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Issuer
          metadata:
            name: "{{ acme_aws_prod_issuer }}"
            namespace: "{{ app_namespace }}"
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: "{{ acme_prod_email }}"
              privateKeySecretRef:
                name: "{{ acme_aws_prod_issuer }}"
              solvers:
                - selector: {}
                  dns01:
                    route53:
                      region: "{{ acme_aws_region }}"
                      accessKeyIDSecretRef:
                        name: "{{ app_namespace }}-route53-credentials"
                        key: access-key-id
                      secretAccessKeySecretRef:
                        name: "{{ app_namespace }}-route53-credentials"
                        key: secret-access-key
      environment:
        KUBECONFIG: /home/stack/.kube/config
      when: acme_route53_access_key_id is defined

    # Cloudflare Credentials Secret
    - name: Create Cloudflare credentials secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ app_namespace }}-cloudflare-credentials"
            namespace: "{{ app_namespace }}"
          type: Opaque
          stringData:
            dns-api-token: "{{ cloudflare_dns_api_token }}"
            global-api-key: "{{ cloudflare_global_api_key }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config
      no_log: true
      when: cloudflare_dns_api_token is defined

    # Cloudflare Issuer
    - name: Create Cloudflare cert-manager issuer
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Issuer
          metadata:
            name: "{{ cloudflare_acme_prod_issuer }}"
            namespace: "{{ app_namespace }}"
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: "{{ acme_prod_email }}"
              privateKeySecretRef:
                name: "{{ cloudflare_acme_prod_issuer }}"
              solvers:
                - selector: {}
                  dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: "{{ app_namespace }}-cloudflare-credentials"
                        key: dns-api-token
      environment:
        KUBECONFIG: /home/stack/.kube/config
      when: cloudflare_dns_api_token is defined

    # Application Secrets
    - name: Create application secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ app_secret_name }}"
            namespace: "{{ app_namespace }}"
          stringData:
            SMTP_USERNAME: "{{ aws_ses_smtp_username }}"
            SMTP_PASSWORD: "{{ aws_ses_smtp_password }}"
            DASHBOARD_PASSWORD: "{{ dashboard_password }}"
            PY4WEB_SERVICE_DB_URI: "postgres://{{ postgres_user }}:{{ postgres_password }}@{{ app_name }}-database.{{ app_namespace }}.svc.cluster.local:5432/{{ postgres_db }}"
            PY4WEB_SESSION_SECRET_KEY: "{{ py4web_session_secret_key }}"
            GOOGLE_CLIENT_ID: "{{ google_client_id }}"
            GOOGLE_CLIENT_SECRET: "{{ google_client_secret }}"
            WDS_API_KEY: "{{ wds_server_auth_api_key }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config
      no_log: true

    # Application StatefulSet
    - name: Create application StatefulSet
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: "{{ app_name }}"
            namespace: "{{ app_namespace }}"
          spec:
            serviceName: "{{ app_name }}"
            replicas: 1
            selector:
              matchLabels:
                app: "{{ app_name }}"
            template:
              metadata:
                labels:
                  app: "{{ app_name }}"
              spec:
                securityContext:
                  fsGroup: 999
                  fsGroupChangePolicy: "OnRootMismatch"
                initContainers:
                  - name: fix-permissions
                    image: busybox:latest
                    command:
                      - sh
                      - -c
                      - |
                        chown -R 999:999 /home/py4web/apps/_default/databases
                        chown -R 999:999 /home/py4web/apps/_default/uploads
                        chmod -R 755 /home/py4web/apps/_default/databases
                        chmod -R 755 /home/py4web/apps/_default/uploads
                    volumeMounts:
                      - name: default-db
                        mountPath: /home/py4web/apps/_default/databases/
                      - name: default-uploads
                        mountPath: /home/py4web/apps/_default/uploads/
                containers:
                  - name: "{{ app_name }}"
                    image: "{{ mdp_app_image }}"
                    imagePullPolicy: "{{ image_pull_policy }}"
                    ports:
                      - containerPort: "{{ app_container_port }}"
                    volumeMounts:
                      - name: default-db
                        mountPath: /home/py4web/apps/_default/databases/
                      - name: default-uploads
                        mountPath: /home/py4web/apps/_default/uploads/
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: "{{ app_container_port }}"
                      initialDelaySeconds: 30
                      periodSeconds: 15
                    readinessProbe:
                      httpGet:
                        path: /healthz
                        port: "{{ app_container_port }}"
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 10
                      successThreshold: 1
                      failureThreshold: 20
                    envFrom:
                      - secretRef:
                          name: "{{ app_secret_name }}"
                    env:
                      - name: CONTAINER_IMAGE
                        value: "{{ mdp_app_image }}"
                      - name: IMAGE_VERSION
                        value: "{{ app_container_image_version }}"
                      - name: TZ
                        value: "{{ container_timezone }}"
                      - name: WDS_ENDPOINT
                        value: "wss://{{ wds_server_domain }}/ws"
                      - name: POD_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.name
                      - name: APP_LOGS_PATH
                        value: "{{ app_logs_path }}"
                      - name: SMTP_SENDER_EMAIL
                        value: "{{ smtp_sender_email }}"
                      - name: SMTP_HOST
                        value: "{{ smtp_host }}"
                      - name: SMTP_PORT
                        value: "465"
                      - name: SMTP_TLS
                        value: "True"
                      - name: PY4WEB_APPS_FOLDER
                        value: "/home/py4web/apps"
                      - name: PY4WEB_SERVICE_FOLDER
                        value: "/home/py4web/apps/.service"
                      - name: PY4WEB_PATH
                        value: "/home/py4web/venv/lib/python3.12/site-packages"
                      - name: PY4WEB_PASSWORD_FILE
                        value: "password.txt"
                      - name: PY4WEB_HOST
                        value: "0.0.0.0"
                      - name: PY4WEB_PORT
                        value: "8000"
                      - name: PY4WEB_YES
                        value: "False"
                      - name: PY4WEB_APP_NAMES
                        value: ""
                      - name: PY4WEB_QUIET
                        value: "False"
                      - name: PY4WEB_ROUTES
                        value: "False"
                      - name: PY4WEB_SERVER
                        value: "default"
                      - name: PY4WEB_NUMBER_WORKERS
                        value: "0"
                      - name: PY4WEB_DASHBOARD_MODE
                        value: "full"
                      - name: PY4WEB_WATCH
                        value: "off"
                      - name: PY4WEB_SSL_CERT
                        value: "None"
                      - name: PY4WEB_SSL_KEY
                        value: "None"
                      - name: PY4WEB_ERRORLOG
                        value: ":stderr"
                      - name: PY4WEB_LOGGING_LEVEL
                        value: "20"
                      - name: PY4WEB_DEBUG
                        value: "False"
                      - name: PY4WEB_URL_PREFIX
                        value: ""
                      - name: PY4WEB_MODE
                        value: "default"
                      - name: PY4WEB_USE_SCHEDULER
                        value: "{{ py4web_use_scheduler | default('False') }}"
                    resources:
                      requests:
                        cpu: "{{ app_server_cpu_min | default('500m') }}"
                        memory: "{{ app_server_memory_min | default('512Mi') }}"
                      limits:
                        cpu: "{{ app_server_cpu_max | default('2000m') }}"
                        memory: "{{ app_server_memory_max | default('2Gi') }}"
            volumeClaimTemplates:
              - metadata:
                  name: default-db
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: "{{ app_storage_class }}"
                  resources:
                    requests:
                      storage: "{{ db_storage_size | default('5Gi') }}"
              - metadata:
                  name: default-uploads
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: "{{ app_storage_class }}"
                  resources:
                    requests:
                      storage: "{{ uploads_storage_size | default('10Gi') }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Application Service
    - name: Create application service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ app_name }}"
            namespace: "{{ app_namespace }}"
          spec:
            type: ClusterIP
            ports:
              - port: "{{ app_container_port }}"
                targetPort: "{{ app_container_port }}"
                protocol: TCP
            selector:
              app: "{{ app_name }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Application Ingress
    - name: Create application ingress
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: "{{ app_name }}"
            namespace: "{{ app_namespace }}"
            annotations:
              cert-manager.io/issuer: "{{ app_cert_issuer }}"
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
          spec:
            ingressClassName: "{{ app_ingress_class }}"
            tls:
              - hosts:
                  - "{{ app_domain }}"
                secretName: "{{ app_name }}-tls"
            rules:
              - host: "{{ app_domain }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: "{{ app_name }}"
                          port:
                            number: "{{ app_container_port }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Wait for application to be ready
    - name: Wait for application pods to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ app_namespace }}"
        label_selectors:
          - "app={{ app_name }}"
        wait: yes
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Verify certificate issuance
    - name: Wait for TLS certificate to be issued
      kubernetes.core.k8s_info:
        kind: Certificate
        name: "{{ app_name }}-tls"
        namespace: "{{ app_namespace }}"
        wait: yes
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      environment:
        KUBECONFIG: /home/stack/.kube/config
      register: cert_status
      retries: 3
      delay: 30
      until: cert_status is succeeded

    # Display deployment summary
    - name: Get application endpoint
      kubernetes.core.k8s_info:
        kind: Ingress
        name: "{{ app_name }}"
        namespace: "{{ app_namespace }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config
      register: ingress_info

    - name: Display deployment summary
      debug:
        msg:
          - "=== Deployment Complete ==="
          - "Application: {{ app_name }}"
          - "Namespace: {{ app_namespace }}"
          - "Domain: https://{{ app_domain }}"
          - "Database: {{ app_name }}-database.{{ app_namespace }}.svc.cluster.local:5432"
          - ""
          - "Verify with:"
          - "  kubectl get pods -n {{ app_namespace }}"
          - "  kubectl get certificate -n {{ app_namespace }}"
          - "  curl https://{{ app_domain }}/health"
