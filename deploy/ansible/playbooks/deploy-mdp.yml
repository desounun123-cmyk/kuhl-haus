---
- name: Deploy Market Data Processor
  hosts: all
  gather_facts: true
  become: true
  become_user: stack

  tasks:
    - name: Set runtime facts for Python interpreter
      ansible.builtin.set_fact:
        ansible_python_interpreter: /opt/ansible/venv/bin/python
        ansible_python_venv_dir: /opt/ansible/venv

    # MDP Server Secrets
    - name: Create Market Data Processor secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ mdp_server_secret_name }}"
            namespace: "{{ data_plane_namespace }}"
          stringData:
            RABBITMQ_API: "https://{{ rabbitmq_user }}:{{ rabbitmq_password }}@{{ mdq_server_domain }}/api/"
            RABBITMQ_URL: "amqp://{{ rabbitmq_user }}:{{ rabbitmq_password }}@mdp-market-data-queues.{{ data_plane_namespace }}.svc.cluster.local:{{ rabbitmq_node_port }}//"
            RABBITMQ_USER: "{{ rabbitmq_user }}"
            RABBITMQ_PASS: "{{ rabbitmq_password }}"
            # REDIS_URL: "redis://:{{ redis_password }}@mdp-redis.{{ data_plane_namespace }}.svc.cluster.local:{{ redis_port }}/0"
            REDIS_URL: "redis://mdp-redis.{{ data_plane_namespace }}.svc.cluster.local:{{ redis_port }}/0"
            REDIS_PASSWORD: "{{ redis_password }}"
            SMTP_USERNAME: "{{ aws_ses_smtp_username }}"
            SMTP_PASSWORD: "{{ aws_ses_smtp_password }}"
            MASSIVE_API_KEY: "{{ massive_api_key }}"
            OTEL_EXPORTER_OTLP_ENDPOINT: "{{ otel_exporter_otlp_endpoint }}"
            OTEL_EXPORTER_OTLP_HEADERS: "{{ otel_exporter_otlp_headers }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config
      no_log: true

    # MDP Server Deployment
    - name: Create Market Data Processor Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ mdp_server_name }}"
            namespace: "{{ data_plane_namespace }}"
          spec:
            replicas: "{{ mdp_server_replicas }}"
            selector:
              matchLabels:
                app: "{{ mdp_server_name }}"
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            template:
              metadata:
                labels:
                  app: "{{ mdp_server_name }}"
              spec:
                containers:
                  - name: "{{ mdp_server_name }}"
                    image: "{{ mdp_server_image }}"
                    imagePullPolicy: "{{ image_pull_policy }}"
                    ports:
                      - containerPort: "{{ mdp_server_container_port }}"
                        name: http
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: "{{ mdp_server_container_port }}"
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 5
                      successThreshold: 1
                      failureThreshold: 3
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: "{{ mdp_server_container_port }}"
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 10
                      successThreshold: 1
                      failureThreshold: 20
                    envFrom:
                      - secretRef:
                          name: "{{ mdp_server_secret_name }}"
                    env:
                      - name: LOG_LEVEL
                        value: "{{ mdp_server_log_level }}"
                      - name: CONTAINER_IMAGE
                        value: "{{ mdp_server_image }}"
                      - name: IMAGE_VERSION
                        value: "{{ app_container_image_version }}"
                      - name: TZ
                        value: "{{ container_timezone }}"
                      - name: MDP_SERVER_DOMAIN
                        value: "{{ mdp_server_domain }}"
                      - name: POD_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.name
                      - name: SMTP_SENDER_EMAIL
                        value: "{{ smtp_sender_email }}"
                      - name: SMTP_HOST
                        value: "{{ smtp_host }}"
                      - name: SMTP_PORT
                        value: "465"
                      - name: SMTP_TLS
                        value: "True"
                      - name: OTEL_SERVICE_NAME
                        value: "mdp"
                      - name: OTEL_TRACES_EXPORTER
                        value: "{{ otel_traces_exporter }}"
                      - name: OTEL_METRICS_EXPORTER
                        value: "{{ otel_metrics_exporter }}"
                      - name: OTEL_LOGS_EXPORTER
                        value: "{{ otel_logs_exporter }}"
                      - name: OTEL_LOG_LEVEL
                        value: "{{ otel_log_level }}"
                      - name: OTEL_EXPORTER_OTLP_PROTOCOL
                        value: "{{ otel_exporter_otlp_protocol}}"
                    resources:
                      requests:
                        cpu: "{{ mdp_server_cpu_min | default('250m') }}"
                        memory: "{{ mdp_server_memory_min | default('256Mi') }}"
                      limits:
                        cpu: "{{ mdp_server_cpu_max | default('1000m') }}"
                        memory: "{{ mdp_server_memory_max | default('1Gi') }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # MDP Server Service
    - name: Create Market Data Processor service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ mdp_server_name }}"
            namespace: "{{ data_plane_namespace }}"
          spec:
            type: ClusterIP
            ports:
              - port: "{{ mdp_server_container_port }}"
                targetPort: "{{ mdp_server_container_port }}"
                protocol: TCP
                name: http
            selector:
              app: "{{ mdp_server_name }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # MDP Server Ingress
    - name: Create Market Data Processor Ingress
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: "{{ mdp_server_name }}"
            namespace: "{{ data_plane_namespace }}"
            annotations:
              cert-manager.io/issuer: "{{ mdp_server_cert_issuer }}"
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
          spec:
            ingressClassName: "{{ mdp_server_ingress_class }}"
            tls:
              - hosts:
                  - "{{ mdp_server_domain }}"
                secretName: "{{ mdp_server_name }}-tls"
            rules:
              - host: "{{ mdp_server_domain }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: "{{ mdp_server_name }}"
                          port:
                            number: "{{ mdp_server_container_port }}"
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Wait for MDP to be ready
    - name: Wait for Market Data Processor to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ data_plane_namespace }}"
        label_selectors:
          - app={{ mdp_server_name }}
        wait: yes
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      environment:
        KUBECONFIG: /home/stack/.kube/config

    # Verify MDP connectivity
    - name: Test Market Data Processor health endpoint
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ data_plane_namespace }}"
        label_selectors:
          - app={{ mdp_server_name }}
      environment:
        KUBECONFIG: /home/stack/.kube/config
      register: mdp_pods

    # Verify certificate issuance
    - name: Wait for TLS certificate to be issued
      kubernetes.core.k8s_info:
        kind: Certificate
        name: "{{ mdp_server_name }}-tls"
        namespace: "{{ data_plane_namespace }}"
        wait: yes
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      environment:
        KUBECONFIG: /home/stack/.kube/config
      register: cert_status
      retries: 3
      delay: 30
      until: cert_status is succeeded

    # Display deployment summary
    - name: Display deployment summary
      debug:
        msg:
          - "=== Market Data Processor Deployment Complete ==="
          - "Service: {{ mdp_server_name }}"
          - "Namespace: {{ data_plane_namespace }}"
          - "API Endpoint: https://{{ mdp_server_domain }}"
          - ""
          - "Dependencies:"
          - "  - RabbitMQ: mdp-market-data-queues.{{ data_plane_namespace }}.svc.cluster.local:{{ rabbitmq_node_port }}"
          - "  - Redis: mdp-redis.{{ app_namespace }}.svc.cluster.local:{{ redis_port }}"
          - ""
          - "Verify with:"
          - "  kubectl get pods -n {{ data_plane_namespace }} -l app={{ mdp_server_name }}"
          - "  curl https://{{ mdp_server_domain }}/health"
